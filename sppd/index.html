<!DOCTYPE html>
<html lang="id">
<head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPPD Desa Tambusai</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f6f9}
table {
  border-collapse: collapse;
}

.tabel-utama {
  width:100%;
  border-collapse:collapse;
  border-top:1px solid black;
  border-bottom:1px solid black;
}

td{
  padding:4px;
  vertical-align:top;
}

.tabel-utama td {
  border:none;
  padding:4px;
  border:none !important;
}

.tabel-utama td:nth-child(3){
  text-align:center;
  width:10px;
}

.tabel-tanpa-garis-dalam {
  border:1px solid black; /* garis luar */
  border-collapse:collapse;
}

.tabel-tanpa-garis-dalam td {
  border:none; /* hilangkan semua garis dalam */
  padding:6px;
}

.tabel-garis-atas-bawah {
  width:100%;
  border-collapse:collapse;
  border-top:1px solid black;
  border-bottom:1px solid black;
  border-left:none;
  border-right:none;
}

.tabel-garis-atas-bawah td {
  border:none !important;
  padding:6px;
}

.tabel-utama td {
  font-size:10pt;
  line-height:1.2;
}

header{background:#1f4e79;color:#fff;padding:15px 20px;font-size:22px;font-weight:bold}
.wrap{display:flex}
.side{width:240px;background:#233445;min-height:100vh;color:#fff}
.side a{display:block;color:#fff;padding:14px 18px;text-decoration:none;border-bottom:1px solid #334}
.side a:hover{background:#1a2733}
.main{flex:1;padding:20px}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.08);margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
input,textarea{width:100%;padding:8px;border:1px solid #ccc;border-radius:6px}
button{padding:10px 14px;border:0;border-radius:6px;background:#1f4e79;color:#fff;cursor:pointer}
.tbl{width:100%;border-collapse:collapse}
.tbl th,.tbl td{border:1px solid #ddd;padding:8px}
.hidden{display:none}
/* A4 FIX */
.a4{
  width:210mm;
  height:297mm;
  padding:1mm 10mm 9mm 10mm;
  box-sizing:border-box;
  font-family:"Times New Roman";
  font-size:11.5pt;
  line-height:1.25;
  background:#fff;
}

@page{
  size:A4;
  margin:0;
}

/* PRINT */
@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{position:absolute;left:0;top:0;width:100%}

  .a4{
    page-break-after:avoid;
  }

  table{
    page-break-inside:avoid;
  }

  tr,td{
    page-break-inside:avoid;
  }
}

/* TABEL RAPI */
table{
  width:100%;
  border-collapse:collapse;
}

td{
  border:1px solid #000;
  padding:4px;
  vertical-align:top;
}

/* OVERLAY CONTAINER */
.a4{
width:794px;
height:1123px;
position:relative;
font-family:"Times New Roman";
}
</style>
</head>

<body>


<div class='wrap'>

<div class='side'>
<a href='#' onclick="show('input')">Input Data SPPD</a>
</div>

<div class='main'>

<!-- INPUT -->
<div id='input' class='card'>
<h2>Input Data SPPD</h2>

<div class='grid'>
<input id='nomor' placeholder='Nomor SPPD'>
<input id='pejabat' placeholder='Pejabat memberi perintah'>
<input id='nama' placeholder='Nama pegawai'>
<input id='nip' placeholder='NIP'>
<input id='gol' placeholder='Pangkat/Golongan'>
<input id='jabatan' placeholder='Jabatan'>
<input id='asal' placeholder='Tempat berangkat'>
<input id='tujuan' placeholder='Tempat tujuan'>
<input id='lama' placeholder='Lama perjalanan'>
<input id="tglberangkat"
  type="text" 
  placeholder="Tanggal Berangkat"
  onfocus="this.type='date'"
  onblur="if(!this.value)this.type='text'">

<input id="tglkembali"
  type="text" 
  placeholder="Tanggal Kembali"
  onfocus="this.type='date'"
  onblur="if(!this.value)this.type='text'">
<input id='transport' placeholder='Alat angkutan'>
<input id='instansi' placeholder='Instansi Pembebanan Anggaran'>
<input id='anggaran' placeholder='Mata anggaran'>
</div>

<br>
<textarea id='maksud' placeholder='Maksud perjalanan dinas'></textarea>
<br><br>

<button onclick='cetak()'>Preview / Cetak</button>
</div>


<!-- PRINT -->
<div id='printArea' class='card hidden'></div>

</div>
</div>

<script>

function show(id){
document.getElementById('input').classList.add('hidden');
document.getElementById(id).classList.remove('hidden');
}

function val(id){
return document.getElementById(id).value;
}

function muat(){
let data=JSON.parse(localStorage.getItem('sppd')||'[]');
list.innerHTML=data.map((x,i)=>`
<tr>
<td>${i+1}</td>
<td>${x.nama}</td>
<td>${x.tujuan}</td>
<td>${x.tgl}</td>
</tr>
`).join('');
}

/* =========================
   CETAK OVERLAY PDF
========================= */
function cetak(){
let h = `

<table class="tabel-garis-atas-bawah">

</div>
`;

printArea.innerHTML = h;
printArea.classList.remove('hidden');
window.print();
}

muat();

</script>
</body>
</html>
